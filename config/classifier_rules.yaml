# [Ref: 01_语义分类器] [Ref: dna_module_a.classification_rules]
# 分类规则由 YAML 驱动；categories 按顺序匹配，先匹配先采用。
# id 为 农业/科技/宏观 时对应 DomainTag 枚举；其余为 DOMAIN_CUSTOM，primary_tag = label。
# industry_keywords 为子串匹配（keyword in industry_name），须与 L2 申万行业名一致；
# 例如「电池」「电力」等二级名需单独列出，不能仅靠「锂电池」「电力及公用事业」覆盖。
# 电力链：火电/水电/核电/风电/新能源发电/燃气/热力 → 公用事业（整段名）；裸「电力」不在此表兜底，由代码按 L2 主营披露映射（无披露则未知）。
# 结构：各大类下「细分子类」在前、「宽口径兜底」在后；新增申万一级见文末「综合与其它」。

