# [Ref: 01_语义分类器] [Ref: dna_module_a.classification_rules]
# 分类规则由 YAML 驱动；categories 按顺序匹配，先匹配先采用。
# id 为 agri/tech/geo 时对应 DomainTag 枚举，其余为自定义 DOMAIN_CUSTOM + label。
# industry_keywords 为子串匹配（"电子" 命中 "消费电子"），覆盖申万一级+二级行业。

categories:
  # ===== 三大核心域 =====
  - id: agri
    label: 农业
    industry_keywords:
      - 农林牧渔
      - 种植
      - 养殖
      - 饲料
      - 种子
      - 林业
      - 渔业
    # revenue_ratio 实际存储的是"毛利率"而非"主营营收占比"，
    # 高毛利行业（医疗器械 60%、化妆品 80%）会误触发，因此不设阈值。

  - id: tech
    label: 科技
    industry_keywords:
      - 电子
      - 计算机
      - 通信
      - 半导体
      - 软件
      - IT服务
      - 互联网
      - 物联网
      - 云计算
      - 人工智能
    # 注意：rnd_ratio 字段实际存储的是"三费占比"而非研发投入占比，
    # 因此不再用 rnd_ratio_threshold 做判定，纯靠行业关键词。

  - id: geo
    label: 周期
    industry_keywords:
      - 有色金属
      - 石油石化
      - 工业金属
      - 小金属
      - 煤炭
      - 钢铁
      - 贵金属
      - 能源金属
    commodity_revenue_ratio_threshold: 0.5

  # ===== 行业域 =====
  - id: 国防军工
    label: 国防军工
    industry_keywords:
      - 国防军工
      - 航天装备
      - 航空装备
      - 军工
      - 航天
      - 航空

  - id: 医药生物
    label: 医药生物
    industry_keywords:
      - 医药生物
      - 医疗器械
      - 医疗服务
      - 生物制品
      - 化学制药
      - 中药
      - 医药商业

  - id: 电力设备
    label: 电力设备
    industry_keywords:
      - 电力设备
      - 光伏
      - 电池
      - 储能
      - 风电
      - 电网

  - id: 金融
    label: 金融
    industry_keywords:
      - 银行
      - 保险
      - 证券
      - 信托
      - 多元金融

  - id: 消费
    label: 消费
    industry_keywords:
      - 化妆品
      - 食品饮料
      - 白酒
      - 家电
      - 纺织服装
      - 汽车
      - 家居

  - id: 传媒
    label: 传媒
    industry_keywords:
      - 传媒
      - 广告
      - 游戏
      - 影视

  - id: 机械设备
    label: 机械设备
    industry_keywords:
      - 机械设备
      - 工程机械
      - 通用设备
      - 专用设备
      - 自动化

  - id: 环保
    label: 环保
    industry_keywords:
      - 环保
      - 环境治理

unknown:
  default_confidence: 0.5
