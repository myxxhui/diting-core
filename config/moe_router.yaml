# [Ref: 04_A轨_MoE议会_设计, dna_module_c] 按股配置 + 统一分析；supported_tags 与策略参数
moe_router:
  # true：左脑须处于「确认档∪预警档」（与 B 写入 snapshot、Module C 默认门控一致），否则右脑短轨不支持。生产建议 true。
  require_quant_passed: true
  supported_tags: ["农业", "科技", "宏观"]
  # 分类器 YAML / L2 快照中的自定义领域名 -> 上列三域之一（生产以本表为准，勿依赖环境变量兜底）
  tag_to_router_domain:
    # 科技成长 / 制造 / TMT
    半导体: 科技
    计算机: 科技
    通信: 科技
    消费电子: 科技
    医疗器械: 科技
    医疗服务: 科技
    生物制品: 科技
    化妆品: 科技
    航天装备: 科技
    航空装备: 科技
    工程机械: 科技
    光伏: 科技
    锂电: 科技
    广告: 科技
    电力: 宏观
    电力设备: 科技
    电网设备: 科技
    风电设备: 科技
    环境治理: 科技
    # 周期资源 / 金融属性 -> 宏观
    工业金属: 宏观
    小金属: 宏观
    贵金属: 宏观
    能源金属: 宏观
    保险: 宏观
    # 农业
    种植: 农业
    # 公用事业 / 能源（偏宏观β）
    水电: 宏观
    火电: 宏观
    热力: 宏观
    核电: 宏观
    风电: 宏观
    新能源发电: 宏观
    售电: 宏观
    电网业务: 宏观
    电网销售: 宏观
    配电运营: 宏观
    电力及相关产品: 宏观
    电力板块: 宏观
    燃气: 宏观
    综合能源服务: 宏观
    电力业务: 宏观
    电力生产与销售业务: 宏观
    总部及其他: 宏观
    房地产: 宏观
  # 所有标签均未命中直配与映射时：null=短轨进垃圾箱；设为 农业/科技/宏观 之一则全员兜底（生产慎用，优先补全 tag_to_router_domain）
  unmapped_router_domain: null
  risk_factor_templates:
    农业: ["政策兑现风险", "存栏供给波动", "气候异常"]
    科技: ["研发不及预期", "技术路线替代", "大基金减持"]
    宏观: ["汇率波动", "供需反转"]
  alignment:
    primary_weight: 0.6
    other_weight: 0.4
    veto_threshold: 0.3
  multi_segment:
    primary_veto: true
    risk_discount: 0.5
  signal_parse:
    fallback_keywords_bullish: ["利好", "上涨", "支持", "政策"]
    fallback_keywords_bearish: ["利空", "下跌", "风险"]
