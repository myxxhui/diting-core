# [Ref: 02_B模块策略_策略实现规约] Module B 策略池、连续打分、优化项；生产默认全部开启
# 与 03_原子目标与规约/Stage3_模块实践/02_B模块策略_策略实现规约.md 对齐
#
# ---------- scanner 节点变量说明（module_b_quant_engine.scanner）----------
# technical_score_threshold   int    总分通过阈值，≥ 该值且满足其余条件则 passed；默认 70
# sector_strength_threshold   float  板块强度通过阈值；默认 1.0，无板块数据时 sector_strength=1.0 恒过
# pass_require_lead_pool_min  number | null  可选收紧·主池下限。未设置(null)则不约束；设为数字(如 85)时，
#                                   通过条件增加「最高池得分 ≥ 该值」，用于将来权重/阈值改动时的保险
# pass_require_second_pool_min number | null  可选收紧·次池下限。未设置(null)则不约束；设为数字(如 25)时，
#                                    通过条件增加「次高池得分 ≥ 该值」，排除「单池满分、其余 0」的通过
#                                    详见 02_B模块通过组合与设计符合度分析.md §五
# -------------------------------------------------------------------------
#
# ---------- optimization 常用项速读（module_b_quant_engine.optimization）----------
# trend_confirm_bars          趋势池：最近几根 K 都要满足条件才给分（越大越严）
# breakout_confirm_bars       突破池：最近几根里至少几根满足突破（越大越严）
# multi_pool_min_score/bonus  多池共振：至少两池 ≥ min 时总分 +bonus（cap 100）
# pool_4_momentum_enabled     是否启用第四池「动量」（20 日收益分位 + 价在 MA20 上）
# momentum_percentile_threshold 动量池：全市场/板块内 20 日收益分位下限，如 0.80=前 20%
# fusion_mode / fusion_weights 多池合成：weighted=按权重加权和；max=取最高池；weights 对应排序后第 1、2、3 高分池
# reversion_volume_bounce_*   反转池：放量止跌时的额外乘数（非「第四池」）
# -------------------------------------------------------------------------

module_b_quant_engine:
  strategy_pools:
    pool_1_trend:
      name: "趋势策略"
      conditions:
        - "均线多头排列：MA5 > MA10 > MA20 > MA60"
        - "MACD 水上金叉：DIF > 0 且 DIF > DEA"
      score_range: [0, 100]
    pool_2_reversion:
      name: "反转策略"
      conditions:
        - "RSI(14) 超卖区间 [20,35] 连续子分；触及 Bollinger 下轨；止跌 close > MA5"
      score_range: [0, 100]
    pool_3_breakout:
      name: "突破策略"
      conditions:
        - "收盘价 > 前 20 日最高；突破幅度按 ATR 归一化"
        - "成交量 > 2×SMA(volume, 20)，量比 cap 5.0"
      score_range: [0, 100]
    pool_4_momentum:
      name: "动量策略"
      conditions:
        - "20 日收益率分位 ≥ 0.80"
        - "close > MA20"
      score_range: [0, 100]
  scoring:
    trend:
      macd_hist_scale_ratio: 0.01
    reversion:
      rsi_oversold: 20
      rsi_soft_ceiling: 35
    breakout:
      price_scale_ratio: 0.02
      volume_cap_multiple: 5.0
      atr_scale_enabled: true
      min_atr_multiple: 0.5
  optimization:
    trend_confirm_bars: 3
    breakout_confirm_bars: 2
    reversion_require_above_ma5: true
    multi_pool_min_score: 40
    multi_pool_bonus: 10
    # 趋势：ADX 弱趋势降权（默认开启）
    trend_adx_enabled: true
    trend_adx_min: 25
    trend_adx_penalty_ratio: 0.6
    # 趋势：部分确认给分（2/3 根满足 ×0.7）
    trend_partial_confirm_enabled: true
    trend_partial_confirm_ratio: 0.7
    # 趋势强度（价格在 60 日区间分位）
    trend_position_strength_enabled: false
    # 反转：放量止跌加成
    reversion_volume_bounce_enabled: true
    reversion_volume_bounce_ratio: 1.2
    reversion_volume_bounce_bonus: 1.1
    # 反转急跌/阴跌权重
    reversion_acute_slow_enabled: false
    reversion_acute_threshold: -0.08
    reversion_slow_threshold: -0.03
    reversion_acute_weight: 1.2
    reversion_slow_weight: 0.6
    # 突破 3 日有效确认
    breakout_hold_days: 0
    breakout_hold_ratio: 0.98
    # 第四池动量（默认开启；与 a_track_short 无冲突）
    pool_4_momentum_enabled: true
    momentum_percentile_threshold: 0.80
    # 多池融合：加权（默认）| max
    fusion_mode: weighted
    fusion_weights: [0.7, 0.2, 0.1]
    # 多池共振二档
    multi_pool_tier2_enabled: false
    multi_pool_tier2_threshold: 60
    multi_pool_tier2_bonus: 5
    # 输出截面分位（默认开启）
    output_score_percentile: true
    # ---------- 两阶段粗筛（默认开启；分位阈值为 0 时仅走分位管线、不额外剔除标的）----------
    coarse_screen:
      enabled: true
      min_momentum_percentile: 0.0
      min_liquidity_percentile: 0.0
    # 最近 N 个日历日：仅当该标的「最新一条」仍为确认/通过档时跳过；最新一条未通过则允许重算（见 signal_cooldown 实现）
    signal_cooldown_days: 1
    signal_cooldown_confirmed_only: true
  # ---------- 性能：线程池并行 evaluate_pools（TA-Lib 多释放 GIL）；0=串行 ----------
  scanner_performance:
    parallel_workers: 4
    min_symbols_for_parallel: 48
    metrics_log_json: true
  # ---------- 下游契约：每条信号附带 market_regime；metrics 写日志 ----------
  product_signals:
    emit_market_regime_per_row: true
    emit_scanner_metrics_log: true
    # 胜率/盈亏比：供 D 判官凯利计算；默认关闭；开启时输出占位值（未来可由回测填充）
    emit_win_rate_payoff: false
    win_rate_prediction: 0.7
    payoff_ratio: 2.0
  filters:
    # 板块强度：同行业 technical_score 截面均值比；数据源 L2 industry_revenue_summary（与 Module A 同源）
    sector_strength:
      enabled: true
      mode: technical_ratio_to_sector_mean
      # 无行业名或 L2 无映射行时使用的 sector_strength 系数（默认 1.0，与历史「恒为 1.0」一致）；信号上 industry_mapped=false
      unmapped_sector_strength: 1.0
    liquidity:
      enabled: false
      min_score: 0
      as_filter: true
    volatility_regime:
      enabled: false
      percentile_threshold: 0.90
      penalty_ratio: 0.8
    # ---------- 基准指数 MA regime；熊市时对趋势池乘子（默认开启）----------
    index_regime:
      enabled: true
      benchmark_symbol: "000300.SH"
      ma_short: 20
      ma_long: 60
      bear_trend_pool_mult: 0.72
      stress_vol_enabled: true
      stress_atr_percentile: 0.82
      stress_breakout_mult: 0.88
      stress_reversion_mult: 1.06
      stress_lookback_bars: 60
    # ---------- Module A 门控（默认开启；allowed_primary_tags 为空=全放行）----------
    # match_mode: exact_primary = 仅 primary_tag 字符串全等（与历史行为一致）
    #            domain_or_primary = primary_tag 或 tags_json 首条领域桶（农业/科技/宏观/未知/自定义）任一命中即可
    # batch_id: 非空时只读该批 classifier_output_snapshot（与当次 A 同批）；null=每标的最新一条。环境变量 SCANNER_CLASSIFIER_BATCH_ID 覆盖此处。
    classifier_gate:
      enabled: true
      match_mode: domain_or_primary
      batch_id: null
      allowed_primary_tags: []
  # 变量说明见文件顶部 scanner 节点变量说明
  # ---------- B 轨长期价值发现（long_term）----------
  # long_term_enabled           bool   是否计算长期动量并输出 long_term_score / long_term_candidate；默认 true
  # long_term_lookback_days     int    长期收益回溯天数（如 120）；需 OHLCV 至少该长度
  # long_term_score_threshold   float  截面分位 [0,1] 达到该值视为 B 轨候选（long_term_candidate=True）；默认 0.6
  # -------------------------------------------------------------------------
  long_term:
    enabled: true
    lookback_days: 120
    score_threshold: 0.6
  # ---------- A 轨短线 a_track_short（技术面 + 建议风控；≠ 三轨制里的「B 轨中线」）----------
  # 【三档模式 signal_profile】键名须英文；含义如下（只改一个键即切换预设）：
  #   alert_sensitive → 灵敏预警：预警分更低、部分策略更早给分（见 profiles 下覆盖）
  #   balanced        → 平衡：不读 profiles 里额外覆盖，用全局 scanner + optimization
  #   strict          → 严控：提高确认分、要求次池也有分，信号更少更挑
  # 【双档】dual_tier_output：true 时同时算「预警档 ALERT」与「确认档 CONFIRMED」，L2 可只消费确认档
  a_track_short:
    signal_profile: balanced
    dual_tier_output: true
    profiles:
      # 灵敏预警：总分 ≥ alert_technical_score_threshold 可出预警；optimization 可放宽单池确认根数
      alert_sensitive:
        alert_technical_score_threshold: 50
        optimization:
          trend_confirm_bars: 2
      balanced: {}
      # 严控：抬高确认阈值 + 次高池下限，减少「单池虚高」通过
      strict:
        scanner:
          technical_score_threshold: 75
          pass_require_second_pool_min: 25
    risk:
      # 是否计算建议入场/止损/止盈并写入信号（false 则相关字段为空）
      enabled: true
      # 入场价语义标签：当前代码固定用「最后一根日线收盘价」作参考入场价；本字段写入 risk_rules_json 供下游识别，不参与分支
      entry_price_field: last_close
      # 止损算法：fixed_pct=入场价×(1-比例)；atr_multiple=入场价 − ATR×倍数（无 TA-Lib 或 ATR 无效时回退 fixed_pct）
      stop_mode: fixed_pct
      # 固定止损比例，如 0.02≈下跌 2% 触发止损价（与 stop_mode=fixed_pct 或 ATR 回退共用）
      fixed_stop_pct: 0.02
      # ATR 回望根数（仅 stop_mode=atr_multiple 时参与计算；调用 TA-Lib ATR(high,low,close,period)）
      atr_period: 14
      # 止损距离（金额）= 最后一根 K 的 ATR 值 × 本倍数；止损价 = 入场价 − 该距离
      atr_stop_multiple: 2.0
      # 止盈分档：R=每股风险(入场−止损)；第 i 档止盈价 = 入场 + multiples[i]×R；如 [1,2] 即 1R、2R 两目标
      take_profit_r_multiples: [1.0, 2.0]
      # ---------- 可选：按主策略池覆盖（strategy_source 1~4；键须加引号）----------
      # 合并顺序：先全局 risk，再叠本表；再叠 volatility_tier、alert_tier
      # 若希望全市场统一一套止损逻辑：删除本段或改为 strategy_risk_overrides: {}
      strategy_risk_overrides:
        "1":  # 趋势：建议用 ATR 止损（与波动挂钩）
          stop_mode: atr_multiple
          atr_stop_multiple: 2.0
        "2":  # 反转：固定比例略宽，减少噪声扫损
          stop_mode: fixed_pct
          fixed_stop_pct: 0.025
        "3":  # 突破：ATR 略紧
          stop_mode: atr_multiple
          atr_stop_multiple: 1.8
        "4":  # 动量：与趋势类似
          stop_mode: atr_multiple
          atr_stop_multiple: 2.0
      # ---------- 可选：截面波动分档（本批标的 ATR/close 截面分位；与 filters.volatility_regime 独立）----------
      volatility_tier:
        enabled: true
        low_atr_percentile_max: 0.33
        high_atr_percentile_min: 0.66
        low_volatility:   # 相对低波：略收紧止损距离
          atr_stop_multiple_scale: 0.92
          fixed_stop_pct_scale: 0.92
        mid_volatility:
          atr_stop_multiple_scale: 1.0
          fixed_stop_pct_scale: 1.0
        high_volatility:  # 相对高波：略放宽
          atr_stop_multiple_scale: 1.1
          fixed_stop_pct_scale: 1.06
      # ---------- 可选：预警档 ALERT 单独止盈档位（确认档 CONFIRMED 仍用 take_profit_r_multiples）----------
      alert_tier:
        take_profit_r_multiples: [0.5, 1.0]
  scanner:
    technical_score_threshold: 70
    sector_strength_threshold: 1.0
    pass_require_lead_pool_min: null
    pass_require_second_pool_min: null
